# Runs on every push and pull request.
# Developers are expected to have a C compiler; this workflow builds the
# extension from source and runs the test suite.

name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-and-test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # On Windows the MSVC build tools must be on PATH.
      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build extension (in-place)
        run: python setup.py build_ext --inplace

      - name: Run tests
        run: pytest tests/ -v

  lint:
    name: "Lint & type-check"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff (lint + format check)
        run: ruff check . && ruff format --check .

      - name: mypy (type check via stub)
        run: mypy --strict src/
