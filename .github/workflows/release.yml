# Triggered by pushing a version tag (e.g. v1.2.3).
#
# Strategy
# --------
# 1. cibuildwheel builds binary wheels for every supported platform/Python
#    combination.
# 2. A pure source distribution (sdist) is also uploaded so that
#    platforms not covered by the wheel matrix can still build from source

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  #————————————————————————————————————————————————————————————————————————————
  # Build binary wheels (one job per OS, run in parallel)
  #————————————————————————————————————————————————————————————————————————————
  build-wheels:
    name: "Wheels / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (Linux cross-compile for aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: aarch64

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21.3

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  #————————————————————————————————————————————————————————————————————————————
  # Build the source distribution (sdist)
  #————————————————————————————————————————————————————————————————————————————
  build-sdist:
    name: "Source distribution"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  #————————————————————————————————————————————————————————————————————————————
  # Create a GitHub Release and attach wheels + sdist as assets
  #————————————————————————————————————————————————————————————————————————————
  release:
    name: "GitHub Release"
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
