name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false # One OS failure does NOT cancel the other OS runs
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"] 

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # allow-prereleases: true 

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint check (ruff)
        run: ruff check src/mytools

      - name: Format check (ruff)
        run: ruff format --check src/mytools

      - name: Type check (mypy)
        run: mypy src/mytools --strict

      - name: Run tests
        run: pytest
