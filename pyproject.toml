[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"


#--{ Project }-----------------------------------------------------------------

[project]
name = "mytools"
dynamic = ["version"]
description = "Collection of utility tools"
readme = "README.md"
requires-python = ">=3.12"
authors = [{name = "Evan Reumann", email = "evanrileyreumann@gmail.com"}]
license = {text = "MIT"}

[project.optional-dependencies]
dev = ["pytest>=7.0", "mypy>=1.0", "black>=23.0", "ruff>=0.1"]


#--{ Setuptools-Package(s) }---------------------------------------------------

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mytools = ["py.typed"]


#--{ Pytest }------------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]

#--{ Mypy }--------------------------------------------------------------------

[tool.mypy]
python_version = "3.12"
strict = true

#--{ Ruff }--------------------------------------------------------------------

[tool.ruff]
line-length = 80